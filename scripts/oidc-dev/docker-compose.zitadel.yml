# Zitadel in dev mode (TLS disabled, external HTTP), backed by Postgres.
# Used to validate Kura's generic-OIDC IdP against a second, distinct
# OIDC vendor end-to-end.
#
#   docker compose -f scripts/oidc-dev/docker-compose.zitadel.yml up -d
#
# Console:    http://localhost:8086/ui/console
# Bootstrap:  Zitadel prints a one-time admin login (username
#             zitadel-admin@<instance>.localhost, generated password)
#             into the container logs on first start. Tail it with:
#
#               docker logs -f kura-zitadel | grep -E 'username|password'
#
# Issuer URL once running:
#
#   http://localhost:8086
#
# Zitadel uses the *root* URL as its OIDC issuer — there is no
# realm path (contrast with Keycloak). The redirect URI you register
# for the Kura client must be http://127.0.0.1:8080/oauth/callback.
#
# App registration is click-ops in the Console: Projects → New Project
# → Add an Application → Web. Choose "CODE" flow, "POST" auth method
# (client_secret_post), copy the ClientID and ClientSecret into
# KURA_OIDC_CLIENT_ID / KURA_OIDC_CLIENT_SECRET.
#
# Gotcha: Zitadel only includes the `email_verified` claim when the
# user's email is actually verified. New users created in the Console
# have unverified email until you mark them verified — Kura rejects an
# id_token whose email_verified claim is false (or absent).

services:
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.66.0
    container_name: kura-zitadel
    restart: unless-stopped
    command: >
      start-from-init
      --masterkey "MasterkeyNeedsToHave32Characters"
      --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8086
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: "false"
    ports:
      - "127.0.0.1:8086:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: kura-zitadel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
