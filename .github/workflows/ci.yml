name: CI

# Per-commit pipeline: build, vet, fmt-check, test. Kept fast — the
# expensive real-DigitalOcean e2e is a separate per-release pipeline.
# This grows as later phases land (containerized Postgres, static IaC
# policy checks, terraform plan snapshots).
on:
  push:
  pull_request:

# Least privilege: jobs get a read-only token unless they opt into more.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  # Reports known vulnerabilities reachable from this module's code. Kept as
  # its own job so its signal is distinct from build-test; promote it to a
  # required status check once it is consistently green.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
