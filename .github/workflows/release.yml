name: Release

# Pushing a v* tag (see scripts/release.sh) builds the cross-platform kura
# binaries, generates checksums, attests their build provenance, and
# publishes a GitHub Release. Releases are immutable once published, so this
# runs only on tags — never re-runnable against a moving branch.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # sign the provenance attestation
      attestations: write # record the attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Quality gate
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
          go vet ./...
          go test ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build cross-platform binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${platform%/*}; arch=${platform#*/}
            name="kura_${VERSION}_${os}_${arch}"
            bin="kura"; [ "$os" = "windows" ] && bin="kura.exe"
            mkdir -p "dist/$name"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/$name/$bin" ./cmd/kura
            cp LICENSE README.md "dist/$name/"
            if [ "$os" = "windows" ]; then
              (cd dist && zip -qr "${name}.zip" "$name")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "$name"
            fi
            rm -rf "dist/$name"
          done

      - name: Generate checksums
        run: |
          cd dist
          shopt -s nullglob
          sha256sum *.tar.gz *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Mark 0.x and any pre-release suffix (e.g. v1.0.0-rc.1) as prerelease.
          prerelease=""
          case "$VERSION" in
            v0.*|*-*) prerelease="--prerelease" ;;
          esac
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $prerelease \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS
