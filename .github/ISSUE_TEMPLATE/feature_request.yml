name: Feature request
description: Propose a capability or change to Kura
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Kura to do? Sketch the CLI/API/behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
  - type: checkboxes
    id: scope
    attributes:
      label: Where does this belong?
      description: Kura is adapter-over-core; logic belongs in internal/.
      options:
        - label: This is core enforcement behavior (authorization, audit, PII, encryption, data access)
        - label: This is an adapter concern (CLI / HTTP API / dashboard / MCP presentation)
        - label: Not sure
