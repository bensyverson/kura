name: Bug report
description: Report a defect in Kura (not a security vulnerability)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        use [private vulnerability reporting](../security/advisories/new) instead
        (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or a manifest snippet that triggers it.
      placeholder: |
        1. kura ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kura version
      description: Output of `kura version`.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - CLI (kura <verb>)
        - HTTP API (kura serve)
        - Dashboard
        - MCP server
        - Core library (internal/)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS/arch, Postgres version, and how Kura is deployed, if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. Redact secrets and PII.
      render: shell
