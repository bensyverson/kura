{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} · kura</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="topbar">
  <a class="brand" href="/"><span class="brand-mark" aria-hidden="true">蔵</span>kura</a>
  <nav class="nav" aria-label="Primary">
    {{range .Nav}}<a href="{{.Path}}"{{if .Active}} aria-current="page"{{end}}>{{.Label}}</a>{{end}}
  </nav>
  <div class="session">
    {{with .Principal}}<span class="session-email">{{.Email}}</span><span class="badge badge-{{.Type}}">{{.Type}}</span>{{end}}
  </div>
</header>
<main id="main" class="content">
{{template "content" .}}
</main>
<script type="module" src="/static/app.js"></script>
</body>
</html>{{end}}
